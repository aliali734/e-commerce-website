<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password | E-Commerce</title>
    <link rel="stylesheet" href="forgot-password.css" />
  </head>
  <body>
    <div class="auth-container">
      <div class="auth-card">
        <h1 class="auth-title">Forgot Password?</h1>
        <p class="auth-subtitle">
          Enter your email and we'll send you a reset link.
        </p>

        <div id="ui-message" class="ui-message" style="display: none"></div>

        <div class="auth-form">
          <div class="form-group">
            <label for="email">Email Address</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="Enter your registered email"
              autocomplete="email"
              required
            />
          </div>

          <button type="button" id="forgotBtn" class="btn btn-primary">
            Send Reset Link
          </button>
        </div>

        <p class="auth-link">
          Remembered your password?
          <a href="../login/login.html">Sign in</a>
        </p>
      </div>
    </div>

    <script src="../../csrf-and-token-functions/get-csrf-cookie-token-frontend.js"></script>
    <script src="../../csrf-and-token-functions/safe-json-parser-frontend.js"></script>
    <script src="../../csrf-and-token-functions/ui-message-frontend.js"></script>
    <script src="forgot-password-process-frontend.js"></script>
  </body>
</html>
