<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signing In | E-Commerce</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #f0f2f5;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #1a1a2e;
      }

      .card {
        background: #fff;
        border-radius: 16px;
        padding: 2.5rem 2rem;
        box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        text-align: center;
        max-width: 400px;
        width: 100%;
      }

      .spinner {
        width: 48px;
        height: 48px;
        border: 4px solid #e5e7eb;
        border-top-color: #4f46e5;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 1.5rem;
      }

      @keyframes spin { to { transform: rotate(360deg); } }

      h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 0.5rem; }
      p  { font-size: 0.9rem; color: #666; }

      .error-icon { font-size: 3rem; margin-bottom: 1rem; }
    </style>
  </head>
  <body>
    <div class="card" id="card">
      <div class="spinner" id="spinner"></div>
      <h1 id="title">Completing sign in...</h1>
      <p id="subtitle">Please wait a moment.</p>
    </div>

    <script src="oauth-callback-process-frontend.js"></script>
  </body>
</html>
