<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | E-Commerce</title>
    <link rel="stylesheet" href="register.css" />
  </head>
  <body>
    <div class="auth-container">
      <div class="auth-card">
        <h1 class="auth-title">Create Account</h1>
        <p class="auth-subtitle">Join us and start shopping today</p>

        <div id="ui-message" class="ui-message" style="display: none"></div>

        <div class="auth-form">
          <div class="form-group">
            <label for="username">Username</label>
            <input
              type="text"
              id="username"
              name="username"
              placeholder="Choose a username"
              autocomplete="username"
              required
            />
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="Enter your email"
              autocomplete="email"
              required
            />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Create a password"
              autocomplete="new-password"
              required
            />
          </div>

          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <input
              type="password"
              id="confirmPassword"
              name="confirmPassword"
              placeholder="Repeat your password"
              autocomplete="new-password"
              required
            />
          </div>

          <button type="button" id="registerBtn" class="btn btn-primary">
            Create Account
          </button>
        </div>

        <div class="oauth-divider">
          <span>or continue with</span>
        </div>

        <div class="oauth-buttons">
          <a href="/auth/user/oauth/google" class="btn-oauth btn-google">
            <svg width="18" height="18" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
              <path fill="#EA4335" d="M24 9.5c3.14 0 5.95 1.08 8.17 2.84l6.1-6.1C34.36 3.04 29.45 1 24 1 14.82 1 7.07 6.48 3.88 14.18l7.14 5.55C12.74 13.72 17.94 9.5 24 9.5z"/>
              <path fill="#4285F4" d="M46.52 24.5c0-1.64-.15-3.22-.42-4.74H24v8.98h12.68c-.55 2.94-2.2 5.43-4.68 7.1l7.19 5.59C43.36 37.44 46.52 31.42 46.52 24.5z"/>
              <path fill="#FBBC05" d="M11.02 28.27A14.6 14.6 0 0 1 9.5 24c0-1.48.26-2.91.72-4.27L3.08 14.18A23.93 23.93 0 0 0 1 24c0 3.88.93 7.55 2.88 10.73l7.14-6.46z"/>
              <path fill="#34A853" d="M24 47c5.45 0 10.02-1.8 13.36-4.88l-7.19-5.59c-1.8 1.21-4.1 1.97-6.17 1.97-6.06 0-11.26-4.22-13.1-9.96l-7.14 6.46C7.07 41.52 14.82 47 24 47z"/>
            </svg>
            Continue with Google
          </a>

          <a href="/auth/user/oauth/facebook" class="btn-oauth btn-facebook">
            <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path fill="#fff" d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.41c0-3.025 1.792-4.697 4.533-4.697 1.312 0 2.686.235 2.686.235v2.97h-1.513c-1.491 0-1.956.93-1.956 1.885v2.27h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/>
            </svg>
            Continue with Facebook
          </a>
        </div>

        <p class="auth-link">
          Already have an account?
          <a href="../login/login.html">Sign in</a>
        </p>
      </div>
    </div>

    <script src="../../csrf-and-token-functions/get-csrf-cookie-token-frontend.js"></script>
    <script src="../../csrf-and-token-functions/safe-json-parser-frontend.js"></script>
    <script src="../../csrf-and-token-functions/ui-message-frontend.js"></script>
    <script src="../../csrf-and-token-functions/auto-redirect-if-logged-in-frontend.js"></script>
    <script src="register-process-frontend.js"></script>
  </body>
</html>
