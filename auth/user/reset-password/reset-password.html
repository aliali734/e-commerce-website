<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password | E-Commerce</title>
    <link rel="stylesheet" href="reset-password.css" />
  </head>
  <body>
    <div class="auth-container">
      <div class="auth-card">
        <h1 class="auth-title">Reset Password</h1>
        <p class="auth-subtitle">Enter your new password below.</p>

        <div id="ui-message" class="ui-message" style="display: none"></div>

        <div class="auth-form">
          <div class="form-group">
            <label for="password">New Password</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Enter new password"
              autocomplete="new-password"
              required
            />
          </div>

          <div class="form-group">
            <label for="confirmPassword">Confirm New Password</label>
            <input
              type="password"
              id="confirmPassword"
              name="confirmPassword"
              placeholder="Repeat new password"
              autocomplete="new-password"
              required
            />
          </div>

          <button type="button" id="resetBtn" class="btn btn-primary">
            Reset Password
          </button>
        </div>

        <p class="auth-link">
          <a href="../login/login.html">Back to Sign In</a>
        </p>
      </div>
    </div>

    <script src="../../csrf-and-token-functions/get-csrf-cookie-token-frontend.js"></script>
    <script src="../../csrf-and-token-functions/safe-json-parser-frontend.js"></script>
    <script src="../../csrf-and-token-functions/ui-message-frontend.js"></script>
    <script src="reset-password-process-frontend.js"></script>
  </body>
</html>
